inherit_from:
  - https://raw.githubusercontent.com/trinistr/rubocop-config/main/rubocop.yml

plugins:
  - rubocop-packaging
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec
  - rubocop-thread_safety
  - rubocop-yard

Layout/RedundantLineBreak:
  Exclude:
    - lib/chronar/parser/*

Style/BlockDelimiters:
  Exclude:
    - lib/chronar/parser/*